name: Build and publish resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Compile resume PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex

      - name: Prepare resume website
        run: |
          mkdir -p public
          cp main.pdf public/resume.pdf
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=resume.pdf">' > public/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload resume website
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish resume
        id: deployment
        uses: actions/deploy-pages@v4
